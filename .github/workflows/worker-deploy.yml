name: Deploy Cloudflare Worker

on:
  # main への push で自動デプロイする。worker/ 配下 or このファイル自体の変更が対象。
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch:
    inputs:
      bootstrap_d1:
        description: "初回のみtrue: D1データベースを新規作成しスキーマを適用してからデプロイする"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

      - name: Create D1 database if it doesn't exist yet (bootstrap only)
        if: ${{ inputs.bootstrap_d1 == true }}
        run: |
          npx wrangler d1 create vocab-db || echo "vocab-db already exists (or create failed) — continuing, assuming wrangler.toml already has the correct database_id"

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply vocab-db --remote

      - name: Deploy Worker
        run: npx wrangler deploy

      - name: Seed master vocabulary (AWL / Oxford 5000 / Target1900 / Target1400)
        run: |
          # デプロイ直後はCloudflareのエッジ伝播が完了しておらず、旧バージョンのWorkerが
          # 応答してシードが不完全になることがあるため、少し待ってから実行する。
          sleep 15
          curl -sf -X POST "https://vocab-app.ryoxsakai.workers.dev/api/seed-preset-lists" \
            -H "Content-Type: application/json" \
            --retry 5 --retry-delay 10 --retry-all-errors

      - name: Normalize part-of-speech tags (1字漢字へ統一)
        run: |
          curl -sf -X POST "https://vocab-app.ryoxsakai.workers.dev/api/normalize-pos" \
            -H "Content-Type: application/json" \
            --retry 5 --retry-delay 10 --retry-all-errors

      - name: Fix examples formatting (capitalization/punctuation, one-off)
        run: |
          curl -sf -X POST "https://vocab-app.ryoxsakai.workers.dev/api/fix-examples-formatting" \
            -H "Content-Type: application/json" \
            --data-binary "@src/data/examples-formatting-fix.json" \
            --retry 5 --retry-delay 10 --retry-all-errors
