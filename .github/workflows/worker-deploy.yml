name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch:
    inputs:
      bootstrap_d1:
        description: "初回のみtrue: D1データベースを新規作成しスキーマを適用してからデプロイする"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

      - name: Create D1 database if it doesn't exist yet (bootstrap only)
        if: ${{ inputs.bootstrap_d1 == true }}
        run: |
          npx wrangler d1 create vocab-db || echo "vocab-db already exists (or create failed) — continuing, assuming wrangler.toml already has the correct database_id"

      - name: Apply schema to remote D1 (bootstrap only)
        if: ${{ inputs.bootstrap_d1 == true }}
        run: npx wrangler d1 execute vocab-db --remote --file=./schema.sql

      - name: Deploy Worker
        run: npx wrangler deploy
