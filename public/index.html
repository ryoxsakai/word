<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f8f9fc" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#12141a" media="(prefers-color-scheme: dark)" />
<title>単語帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,400;0,500;0,700;1,400&family=M+PLUS+2:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="./shared/fonts/charis-sil.css" />
<link rel="stylesheet" href="./viewer/style.css" />
</head>
<body>
<header class="topbar">
  <div class="topbar-row topbar-row--primary">
    <h1 class="brand-name">単語帳</h1>
    <div class="toolbar-controls">
      <select id="listSelect" aria-label="リストを選択"></select>
      <button id="themeToggleBtn" type="button" class="topbar-text-btn" title="ダーク/ライト切り替え">ダーク</button>
      <a class="topbar-text-btn" href="./setting/index.html" title="単語を編集">編集</a>
    </div>
    <button type="button" class="menu-toggle" id="menuToggle" aria-expanded="false" aria-controls="topbarMenu" aria-label="メニューを開く">
      <span class="menu-toggle-bar"></span>
      <span class="menu-toggle-bar"></span>
      <span class="menu-toggle-bar"></span>
    </button>
  </div>
  <div class="topbar-row topbar-row--secondary" id="topbarMenu">
    <div class="search-row">
      <input id="searchInput" type="search" placeholder="スペル・意味・タグで検索" autocomplete="off" />
      <button id="unlearnedOnlyBtn" type="button" class="chip-toggle" aria-pressed="false">未習得のみ</button>
    </div>
    <form id="jumpForm" class="jump-row">
      <label for="jumpInput">no.</label>
      <input id="jumpInput" type="text" inputmode="numeric" placeholder="42" />
      <button type="submit">ジャンプ</button>
    </form>
    <div class="fontsize-row">
      <span class="fontsize-label">文字サイズ</span>
      <div class="fontsize-steps" id="fontSizeSteps" role="group" aria-label="文字サイズ（5段階）">
        <button type="button" class="fontsize-btn" data-font-level="1" aria-label="最小">A</button>
        <button type="button" class="fontsize-btn" data-font-level="2" aria-label="小">A</button>
        <button type="button" class="fontsize-btn" data-font-level="3" aria-label="標準">A</button>
        <button type="button" class="fontsize-btn" data-font-level="4" aria-label="大">A</button>
        <button type="button" class="fontsize-btn" data-font-level="5" aria-label="最大">A</button>
      </div>
    </div>
  </div>
</header>

<div class="subbar">
  <div class="progress-row">
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    <span id="progressLabel" class="progress-label">0 / 0 習得</span>
  </div>
</div>

<main id="wordList" class="word-list" aria-live="polite"></main>

<p id="emptyMsg" class="empty-msg" hidden>単語がまだ登録されていません。<a href="./setting/index.html">設定ページ</a>から追加できます。</p>
<p id="loadingMsg" class="loading-msg">読み込み中...</p>

<nav id="sectionNav" class="section-nav" hidden></nav>
<button id="backToTopBtn" type="button" class="back-to-top" hidden title="先頭に戻る"><i class="fa-solid fa-arrow-up" aria-hidden="true"></i></button>
<div id="toast" class="toast" hidden></div>

<script type="module" src="./viewer/app.js"></script>
</body>
</html>
