<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f8f9fc" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#12141a" media="(prefers-color-scheme: dark)" />
<title>単語帳 設定</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,400;0,500;0,700;1,400&family=M+PLUS+2:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="../shared/fonts/charis-sil.css" />
<link rel="stylesheet" href="./style.css" />
</head>
<body>
<div class="layout" id="layout">
  <header class="topbar">
    <div class="topbar-row topbar-row--primary">
      <h1 class="app-title">単語帳</h1>
      <span class="app-subtitle">設定</span>
      <a class="viewer-link" href="../index.html" target="_blank" rel="noopener">閲覧 <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i></a>
      <button type="button" class="btn-compact" id="themeToggleBtn" title="ダーク/ライト切り替え">ダーク</button>
      <button type="button" class="menu-toggle" id="menuToggle" aria-expanded="false" aria-controls="topbarMenu" aria-label="メニューを開く">
        <span class="menu-toggle-bar"></span>
        <span class="menu-toggle-bar"></span>
        <span class="menu-toggle-bar"></span>
      </button>
    </div>
    <div class="topbar-row topbar-row--secondary" id="topbarMenu">
      <div class="master-toolbar" id="masterToolbar" hidden>
        <div class="master-filters">
          <input type="search" id="masterSearch" placeholder="スペルで検索…" autocomplete="off" />
          <select id="filterAwl" aria-label="AWL sublistで絞り込み">
            <option value="">AWL 全sublist</option>
            <option value="1">AWL 1</option>
            <option value="2">AWL 2</option>
            <option value="3">AWL 3</option>
            <option value="4">AWL 4</option>
            <option value="5">AWL 5</option>
            <option value="6">AWL 6</option>
            <option value="7">AWL 7</option>
            <option value="8">AWL 8</option>
            <option value="9">AWL 9</option>
            <option value="10">AWL 10</option>
          </select>
          <select id="filterOxford" aria-label="Oxford 5000レベルで絞り込み">
            <option value="">Oxford 全レベル</option>
            <option value="A1">A1</option>
            <option value="A2">A2</option>
            <option value="B1">B1</option>
            <option value="B2">B2</option>
            <option value="C1">C1</option>
          </select>
          <label class="filter-checkbox"><input type="checkbox" id="filterTarget1900" /> Target1900のみ</label>
          <label class="filter-checkbox"><input type="checkbox" id="filterTarget1400" /> Target1400のみ</label>
        </div>
        <div class="master-actions">
          <span id="selectionCount" class="selection-count">0語選択</span>
          <button id="selectAllMasterBtn" type="button" class="btn-ghost" title="現在読み込み済みの単語のみ選択されます"><i class="fa-solid fa-square-check" aria-hidden="true"></i><span>表示中を全選択</span></button>
          <button id="clearSelectionBtn" type="button" class="btn-ghost"><i class="fa-solid fa-xmark" aria-hidden="true"></i><span>解除</span></button>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="word-table-pane" id="wordTablePane">
      <div class="pane-header">
        <div class="list-switcher">
          <select id="listSelect" aria-label="表示するリスト"></select>
          <button id="listManageBtn" type="button" class="btn-compact"><i class="fa-solid fa-pen" aria-hidden="true"></i><span>編集</span></button>
        </div>
        <div class="pane-header-actions">
          <button id="addToNotebookBtn" type="button" class="btn-ghost" disabled hidden><i class="fa-solid fa-book" aria-hidden="true"></i><span>単語帳に追加</span></button>
          <button id="newWordBtn" type="button" disabled><i class="fa-solid fa-plus" aria-hidden="true"></i><span>単語を追加</span></button>
          <button id="newSectionBtn" type="button" class="btn-ghost" disabled hidden><i class="fa-solid fa-plus" aria-hidden="true"></i><span>セクション</span></button>
        </div>
      </div>

      <div class="table-scroll" id="tableScroll">
        <table class="word-table">
          <thead id="wordTableHead">
            <tr><th class="col-no">no.</th><th>スペル</th><th class="col-meaning">意味</th><th class="col-awl">AWL</th><th class="col-oxford">Oxford</th><th class="col-eiken">英検</th><th class="col-target1900">1900</th><th class="col-target1400">1400</th><th class="col-pron">発音</th><th class="col-caution-pron">発音注意</th><th class="col-caution-accent">アクセント注意</th></tr>
          </thead>
          <tbody id="wordTableBody"></tbody>
        </table>
        <p id="masterLoadingMore" class="loading-more" hidden>読み込み中…</p>
      </div>
      <p id="wordTableEmpty" class="empty-msg" hidden>このリストにはまだ単語がありません。</p>
    </section>

  </main>
</div>

<div id="toast" class="toast" hidden></div>

<div class="modal-overlay" id="editModalOverlay" hidden>
  <section class="edit-pane" id="editPane" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <div class="pane-header pane-header--edit">
      <h2 id="editTitle">単語を編集</h2>
      <div class="edit-actions">
        <button id="draftFromDictionaryBtn" type="button" class="btn-ghost" title="辞書から発音・例文・類義語/対義語の下書きを取得"><i class="fa-solid fa-book-open" aria-hidden="true"></i><span>辞書下書き</span></button>
        <button id="saveBtn" type="button" class="primary"><i class="fa-solid fa-floppy-disk" aria-hidden="true"></i><span>保存</span></button>
        <button id="deleteBtn" type="button" class="danger btn-ghost"><i class="fa-solid fa-trash-can" aria-hidden="true"></i><span>削除</span></button>
        <button id="closeBtn" type="button" class="btn-ghost" aria-label="閉じる"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
      </div>
    </div>

    <form id="wordForm" class="word-form">
      <div class="field-row">
        <label>スペル
          <input type="text" id="fieldSpelling" required autocapitalize="none" spellcheck="false" />
        </label>
        <label class="field-pronunciation">発音記号 (IPA) <span class="hint">入力時に自動取得</span>
          <span class="input-with-btn">
            <input type="text" id="fieldPronunciation" placeholder="/səˈpɔːrt/" />
            <button type="button" id="lookupPronunciationBtn" title="辞書から発音記号を取得し直す" aria-label="発音を再取得"><i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i></button>
            <button type="button" id="playAudioBtn" title="発音を再生" aria-label="発音を再生" disabled><i class="fa-solid fa-play" aria-hidden="true"></i></button>
            <button type="button" id="pronunciationCautionBtn" class="caution-toggle-btn" aria-pressed="false" title="発音を間違えやすい単語としてマークします"><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i><span>発音注意</span></button>
            <button type="button" id="accentCautionBtn" class="caution-toggle-btn" aria-pressed="false" title="アクセント位置を間違えやすい単語としてマークします"><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i><span>アクセント注意</span></button>
          </span>
        </label>
      </div>
      <div class="field-row notebook-only" id="notebookFields">
        <label>このリストでの no. <span class="hint">例: 42 / 42-1</span>
          <input type="text" id="fieldNo" placeholder="42" inputmode="numeric" />
        </label>
        <label>派生元 <span class="hint">同じ no の枝番になる</span>
          <input type="text" id="fieldDerivedFrom" placeholder="（なし）" autocapitalize="none" />
        </label>
        <label>セクション
          <select id="fieldSection"><option value="">なし</option></select>
        </label>
      </div>

      <fieldset>
        <legend>意味（品詞ごと） <span class="hint">品詞: 名=名詞 自=自動詞 他=他動詞 形=形容詞 副=副詞 代=代名詞 冠=冠詞 前=前置詞 接=接続詞 間=間投詞 助=助動詞 熟=熟語 連=連語。「見出し」は単語一覧に表示する代表の意味</span></legend>
        <div id="sensesList" class="repeat-list"></div>
        <button type="button" class="add-row-btn" data-add="senses"><i class="fa-solid fa-plus" aria-hidden="true"></i><span>意味を追加</span></button>
      </fieldset>

      <fieldset>
        <legend>例文・フレーズ <span class="hint">◆例文 / ◇フレーズ。空所は ＿＿＿</span></legend>
        <div id="examplesList" class="repeat-list"></div>
        <button type="button" class="add-row-btn" data-add="examples"><i class="fa-solid fa-plus" aria-hidden="true"></i><span>例文・フレーズを追加</span></button>
      </fieldset>

      <fieldset>
        <legend>派生語</legend>
        <div id="derivativesList" class="repeat-list"></div>
        <button type="button" class="add-row-btn" data-add="derivatives"><i class="fa-solid fa-plus" aria-hidden="true"></i><span>派生語を追加</span></button>
      </fieldset>

      <fieldset class="collapsible" data-fieldset="etymology">
        <button type="button" class="fieldset-toggle">
          <span class="fieldset-title">語源</span>
          <span class="hint">##見出し語## / *語根* / ==語==</span>
          <i class="fa-solid fa-chevron-down fieldset-chevron" aria-hidden="true"></i>
        </button>
        <div class="fieldset-body">
          <textarea id="fieldEtymology" class="autosize" rows="1" placeholder="sup- (下から) + *port* (運ぶ)"></textarea>
          <div class="preview" id="etymologyPreview"></div>
        </div>
      </fieldset>

      <fieldset class="collapsible" data-fieldset="synonyms">
        <button type="button" class="fieldset-toggle">
          <span class="fieldset-title">類義語</span>
          <span class="hint">##headword## / ##headword|表示##</span>
          <i class="fa-solid fa-chevron-down fieldset-chevron" aria-hidden="true"></i>
        </button>
        <div class="fieldset-body">
          <textarea id="fieldSynonyms" class="autosize" rows="1" placeholder="help, aid, assist"></textarea>
          <div class="preview" id="synonymsPreview"></div>
        </div>
      </fieldset>

      <fieldset class="collapsible" data-fieldset="antonyms">
        <button type="button" class="fieldset-toggle">
          <span class="fieldset-title">対義語</span>
          <span class="hint">##headword## / ##headword|表示##</span>
          <i class="fa-solid fa-chevron-down fieldset-chevron" aria-hidden="true"></i>
        </button>
        <div class="fieldset-body">
          <textarea id="fieldAntonyms" class="autosize" rows="1" placeholder="hinder, obstruct"></textarea>
          <div class="preview" id="antonymsPreview"></div>
        </div>
      </fieldset>

      <fieldset class="collapsible" data-fieldset="notes">
        <button type="button" class="fieldset-toggle">
          <span class="fieldset-title">メモ</span>
          <span class="hint">##headword## / ##headword|表示##</span>
          <i class="fa-solid fa-chevron-down fieldset-chevron" aria-hidden="true"></i>
        </button>
        <div class="fieldset-body">
          <textarea id="fieldNotes" class="autosize" rows="1" placeholder="##import## も参照。"></textarea>
          <div class="preview" id="notesPreview"></div>
        </div>
      </fieldset>

      <fieldset class="collapsible" data-fieldset="tags">
        <button type="button" class="fieldset-toggle">
          <span class="fieldset-title">レベルタグ</span>
          <i class="fa-solid fa-chevron-down fieldset-chevron" aria-hidden="true"></i>
        </button>
        <div class="fieldset-body">
          <div class="tags-row">
            <label class="tag-select">Oxford 5000
              <select id="tagOxford5000">
                <option value="">―</option>
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="B1">B1</option>
                <option value="B2">B2</option>
                <option value="C1">C1</option>
              </select>
            </label>
            <label class="tag-select">AWL
              <select id="tagAwl">
                <option value="">―</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </label>
            <label class="tag-select">英検
              <select id="tagEiken">
                <option value="">―</option>
                <option value="5級">5級</option>
                <option value="4級">4級</option>
                <option value="3級">3級</option>
                <option value="準2級">準2級</option>
                <option value="2級">2級</option>
                <option value="準1級">準1級</option>
                <option value="1級">1級</option>
              </select>
            </label>
          </div>
          <div class="tags-readonly-row">
            <span class="tag-readonly" id="tagTarget1900Display" hidden></span>
            <span class="tag-readonly" id="tagTarget1400Display" hidden></span>
          </div>
          <label class="custom-tags-label">カスタムタグ（カンマ区切り）
            <input type="text" id="tagCustom" placeholder="医学部頻出, 語法注意" />
          </label>
        </div>
      </fieldset>
    </form>
  </section>
</div>

<div class="modal-overlay" id="sectionModalOverlay" hidden>
  <section class="edit-pane section-edit-pane" id="sectionEditPane" role="dialog" aria-modal="true" aria-labelledby="sectionEditTitle">
    <div class="pane-header pane-header--edit">
      <h2 id="sectionEditTitle">セクションを編集</h2>
      <div class="edit-actions">
        <button id="sectionSaveBtn" type="button" class="primary"><i class="fa-solid fa-floppy-disk" aria-hidden="true"></i><span>保存</span></button>
        <button id="sectionDeleteBtn" type="button" class="danger btn-ghost"><i class="fa-solid fa-trash-can" aria-hidden="true"></i><span>削除</span></button>
        <button id="sectionCloseBtn" type="button" class="btn-ghost" aria-label="閉じる"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
      </div>
    </div>
    <form id="sectionForm" class="word-form">
      <label>セクション名
        <input type="text" id="sectionFieldName" required />
      </label>
      <label>サブタイトル <span class="hint">閲覧ページでタイトルの横に表示します</span>
        <input type="text" id="sectionFieldSubtitle" placeholder="（任意）" />
      </label>
      <label>説明 <span class="hint">閲覧ページでタイトルの下に目立たない形で表示します</span>
        <textarea id="sectionFieldDescription" rows="3" placeholder="（任意）"></textarea>
      </label>
    </form>
  </section>
</div>

<div class="modal-overlay" id="addNotebookModalOverlay" hidden>
  <section class="edit-pane section-edit-pane" id="addNotebookPane" role="dialog" aria-modal="true" aria-labelledby="addNotebookTitle">
    <div class="pane-header pane-header--edit">
      <h2 id="addNotebookTitle">単語帳に追加</h2>
      <div class="edit-actions">
        <button id="addNotebookConfirmBtn" type="button" class="primary"><i class="fa-solid fa-book" aria-hidden="true"></i><span>追加</span></button>
        <button id="addNotebookCloseBtn" type="button" class="btn-ghost" aria-label="閉じる"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
      </div>
    </div>
    <form id="addNotebookForm" class="word-form">
      <p id="addNotebookCount" class="add-notebook-count"></p>
      <label>追加先の単語帳
        <select id="addNotebookSelect"></select>
      </label>
      <label>セクション <span class="hint">（任意）</span>
        <select id="addNotebookSection"><option value="">（セクションなし）</option></select>
      </label>
    </form>
  </section>
</div>

<div class="modal-overlay" id="listManageModalOverlay" hidden>
  <section class="edit-pane section-edit-pane" id="listManagePane" role="dialog" aria-modal="true" aria-labelledby="listManageTitle">
    <div class="pane-header pane-header--edit">
      <h2 id="listManageTitle">単語帳を編集</h2>
      <div class="edit-actions">
        <button id="listManageCloseBtn" type="button" class="btn-ghost" aria-label="閉じる"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
      </div>
    </div>
    <div class="word-form">
      <div id="listManageList" class="list-manage-list"></div>
      <div class="list-manage-new">
        <input type="text" id="listManageNewName" placeholder="新しい単語帳名" autocomplete="off" />
        <button type="button" id="listManageCreateBtn" class="primary"><i class="fa-solid fa-plus" aria-hidden="true"></i><span>作成</span></button>
      </div>
    </div>
  </section>
</div>

<template id="senseRowTpl">
  <div class="repeat-row sense-row" data-kind="senses">
    <select class="pos" aria-label="品詞" title="名=名詞 自=自動詞 他=他動詞 形=形容詞 副=副詞 代=代名詞 冠=冠詞・限定詞 前=前置詞 接=接続詞 間=間投詞 助=助動詞 熟=熟語 連=連語">
      <option value="">―</option>
      <option value="名">名</option>
      <option value="自">自</option>
      <option value="他">他</option>
      <option value="動">動</option>
      <option value="形">形</option>
      <option value="副">副</option>
      <option value="代">代</option>
      <option value="冠">冠</option>
      <option value="前">前</option>
      <option value="接">接</option>
      <option value="間">間</option>
      <option value="助">助</option>
      <option value="熟">熟</option>
      <option value="連">連</option>
    </select>
    <input type="text" class="meaning" placeholder="意味" />
    <input type="text" class="pronunciation" placeholder="発音（品詞ごとに違う場合）" />
    <label class="primary-radio" title="単語一覧に表示する見出しの意味にする">
      <input type="radio" name="isPrimarySense" class="is-primary" /> 見出し
    </label>
    <span class="row-actions">
      <span class="row-drag-handle" draggable="true" title="ドラッグで並び替え"><i class="fa-solid fa-grip-vertical" aria-hidden="true"></i></span>
      <button type="button" class="move-btn" data-action="row-up" aria-label="上へ"><i class="fa-solid fa-chevron-up" aria-hidden="true"></i></button>
      <button type="button" class="move-btn" data-action="row-down" aria-label="下へ"><i class="fa-solid fa-chevron-down" aria-hidden="true"></i></button>
    </span>
    <button type="button" class="remove-row-btn" aria-label="行を削除"><i class="fa-solid fa-trash-can" aria-hidden="true"></i></button>
  </div>
</template>

<template id="derivativeRowTpl">
  <div class="repeat-row derivative-row" data-kind="derivatives">
    <select class="pos" aria-label="品詞" title="名=名詞 自=自動詞 他=他動詞 形=形容詞 副=副詞 代=代名詞 冠=冠詞・限定詞 前=前置詞 接=接続詞 間=間投詞 助=助動詞 熟=熟語 連=連語">
      <option value="">―</option>
      <option value="名">名</option>
      <option value="自">自</option>
      <option value="他">他</option>
      <option value="動">動</option>
      <option value="形">形</option>
      <option value="副">副</option>
      <option value="代">代</option>
      <option value="冠">冠</option>
      <option value="前">前</option>
      <option value="接">接</option>
      <option value="間">間</option>
      <option value="助">助</option>
      <option value="熟">熟</option>
      <option value="連">連</option>
    </select>
    <input type="text" class="word" placeholder="派生語" autocapitalize="none" />
    <input type="text" class="meaning" placeholder="意味" />
    <span class="row-actions">
      <span class="row-drag-handle" draggable="true" title="ドラッグで並び替え"><i class="fa-solid fa-grip-vertical" aria-hidden="true"></i></span>
      <button type="button" class="move-btn" data-action="row-up" aria-label="上へ"><i class="fa-solid fa-chevron-up" aria-hidden="true"></i></button>
      <button type="button" class="move-btn" data-action="row-down" aria-label="下へ"><i class="fa-solid fa-chevron-down" aria-hidden="true"></i></button>
    </span>
    <button type="button" class="remove-row-btn" aria-label="行を削除"><i class="fa-solid fa-trash-can" aria-hidden="true"></i></button>
  </div>
</template>

<template id="exampleRowTpl">
  <div class="repeat-row example-row" data-kind="examples">
    <select class="type" aria-label="種別">
      <option value="example">◆ 例文</option>
      <option value="phrase">◇ フレーズ</option>
    </select>
    <input type="text" class="sentence" placeholder="例文・フレーズ（空所は ＿＿＿）" />
    <input type="text" class="translation" placeholder="和訳" />
    <input type="hidden" class="answer" />
    <span class="row-actions">
      <span class="row-drag-handle" draggable="true" title="ドラッグで並び替え"><i class="fa-solid fa-grip-vertical" aria-hidden="true"></i></span>
      <button type="button" class="move-btn" data-action="row-up" aria-label="上へ"><i class="fa-solid fa-chevron-up" aria-hidden="true"></i></button>
      <button type="button" class="move-btn" data-action="row-down" aria-label="下へ"><i class="fa-solid fa-chevron-down" aria-hidden="true"></i></button>
    </span>
    <button type="button" class="remove-row-btn" aria-label="行を削除"><i class="fa-solid fa-trash-can" aria-hidden="true"></i></button>
  </div>
</template>

<script type="module" src="./app.js"></script>
</body>
</html>
